<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Cosmic Portfolio - a realistic infinite-zoom portfolio set inside a calm cinematic space field.">
  <title>Cosmic Portfolio - Immersive Space</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <div id="sun-glow" aria-hidden="true"></div>
  <canvas id="starfield"></canvas>

  <div id="viewport">
    <div id="world"></div>
  </div>

  <header id="hud" aria-live="polite">
    <div class="hud-block">
      <span class="hud-label">Current World</span>
      <strong id="focus-readout">AETHER - Identity Signal</strong>
    </div>
    <div class="hud-block hud-right">
      <span class="hud-label">Depth</span>
      <strong id="zoom-readout">230%</strong>
    </div>
  </header>

  <div id="world-hint">Scroll to move through depth. Drag to drift between worlds.</div>
  <div id="minimap" aria-label="Spatial orientation"></div>
  <div id="warp-overlay"></div>

  <script type="module">
    import { PLANETS, BLACK_HOLE, WORLD_CONFIG } from './components/planets-data.js';

    class Starfield {
      constructor(canvas) {
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d', { alpha: false });
        this.offscreen = document.createElement('canvas');
        this.offCtx = this.offscreen.getContext('2d', { alpha: false });
        this.parallaxX = 0;
        this.parallaxY = 0;
        this.warp = 0;
        this.raf = null;
        this.prevTs = 0;
        this.init();
      }
      init() {
        this.resize();
        this.build();
        this.renderBase();
        this.loop();
        window.addEventListener('resize', () => {
          this.resize();
          this.build();
          this.renderBase();
        }, { passive: true });
      }
      resize() {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        this.dpr = dpr;
        this.w = window.innerWidth;
        this.h = window.innerHeight;
        [this.canvas, this.offscreen].forEach((c) => {
          c.width = this.w * dpr;
          c.height = this.h * dpr;
          c.style.width = this.w + 'px';
          c.style.height = this.h + 'px';
        });
        this.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        this.offCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }
      build() {
        const nearCount = window.innerWidth < 760 ? 40 : 70;
        const midCount = window.innerWidth < 760 ? 90 : 160;
        const farCount = window.innerWidth < 760 ? 180 : 260;
        this.layers = [
          this.makeLayer(nearCount, 0.018, 1.5, 0.55),
          this.makeLayer(midCount, 0.01, 1.05, 0.34),
          this.makeLayer(farCount, 0.004, 0.75, 0.2),
        ];
      }
      makeLayer(count, driftScale, maxSize, alphaBase) {
        return Array.from({ length: count }, () => ({
          x: Math.random() * this.w,
          y: Math.random() * this.h,
          r: Math.random() * maxSize + 0.2,
          alpha: Math.random() * alphaBase + alphaBase * 0.25,
          driftScale,
          warm: Math.random() < 0.08,
          pulse: Math.random() * Math.PI * 2,
          speed: Math.random() * 0.65 + 0.35,
        }));
      }
      setParallax(x, y) {
        this.parallaxX = x;
        this.parallaxY = y;
      }
      setWarp(amount) {
        this.warp = amount;
      }
      renderBase() {
        const ctx = this.offCtx;
        ctx.clearRect(0, 0, this.w, this.h);
        ctx.fillStyle = '#02040a';
        ctx.fillRect(0, 0, this.w, this.h);
        [
          [this.w * 0.18, this.h * 0.22, this.w * 0.3, 'rgba(20,34,78,0.10)'],
          [this.w * 0.78, this.h * 0.66, this.w * 0.24, 'rgba(9,18,42,0.10)'],
          [this.w * 0.52, this.h * 0.5, this.w * 0.36, 'rgba(30,18,50,0.06)'],
        ].forEach(([x, y, r, color]) => {
          const g = ctx.createRadialGradient(x, y, 0, x, y, r);
          g.addColorStop(0, color);
          g.addColorStop(1, 'transparent');
          ctx.fillStyle = g;
          ctx.fillRect(0, 0, this.w, this.h);
        });
      }
      loop() {
        const tick = (ts) => {
          const t = ts * 0.001;
          const dt = this.prevTs ? Math.min(0.05, (ts - this.prevTs) * 0.001) : 0.016;
          this.prevTs = ts;
          this.ctx.drawImage(this.offscreen, 0, 0, this.w, this.h);
          const lensAlpha = this.warp * 0.18;
          if (lensAlpha > 0.001) {
            this.ctx.fillStyle = `rgba(116,154,220,${lensAlpha.toFixed(3)})`;
            this.ctx.fillRect(0, 0, this.w, this.h);
          }
          this.layers.forEach((layer, layerIndex) => {
            layer.forEach((star) => {
              const px = star.x - this.parallaxX * star.driftScale + Math.sin(t * star.speed + star.pulse) * 0.25 * (layerIndex + 1);
              const py = star.y - this.parallaxY * star.driftScale + Math.cos(t * (star.speed * 0.75) + star.pulse) * 0.18 * (layerIndex + 1);
              const alpha = star.alpha * (0.72 + 0.28 * Math.sin(t * star.speed + star.pulse));
              this.ctx.beginPath();
              this.ctx.arc(px, py, star.r, 0, Math.PI * 2);
              this.ctx.fillStyle = star.warm
                ? `rgba(230,224,214,${alpha.toFixed(3)})`
                : `rgba(210,220,235,${alpha.toFixed(3)})`;
              this.ctx.fill();
            });
          });
          this.raf = requestAnimationFrame(tick);
        };
        this.raf = requestAnimationFrame(tick);
      }
    }

    class ViewportEngine {
      constructor(worldEl, viewportEl) {
        this.world = worldEl;
        this.viewport = viewportEl;
        this.x = 0;
        this.y = 0;
        this.scale = 2.25;
        this.targetX = 0;
        this.targetY = 0;
        this.targetScale = 2.25;
        this.minScale = 0.3;
        this.maxScale = 14;
        this.zoomBoost = 1;
        this.vx = 0;
        this.vy = 0;
        this.dragging = false;
        this.lastX = 0;
        this.lastY = 0;
        this.pinchDist = 0;
        this.friction = 0.92;
        this.wheelSensitivity = 0.0011;
        this.floatX = 0;
        this.floatY = 0;
        this.raf = null;
        this.onZoomChange = null;
        this.bindEvents();
        this.loop();
      }
      bindEvents() {
        const vp = this.viewport;
        this.onMouseDown = (e) => {
          if (e.button !== 0) return;
          this.dragging = true;
          this.lastX = e.clientX;
          this.lastY = e.clientY;
          this.vx = 0;
          this.vy = 0;
          vp.classList.add('grabbing');
        };
        this.onMouseMove = (e) => {
          if (!this.dragging) return;
          const dx = e.clientX - this.lastX;
          const dy = e.clientY - this.lastY;
          this.lastX = e.clientX;
          this.lastY = e.clientY;
          this.targetX += dx;
          this.targetY += dy;
          this.vx = dx;
          this.vy = dy;
        };
        this.onMouseUp = () => {
          this.dragging = false;
          vp.classList.remove('grabbing');
        };
        this.onWheel = (e) => {
          e.preventDefault();
          const rect = vp.getBoundingClientRect();
          const delta = e.deltaMode === 1 ? e.deltaY * 16 : e.deltaMode === 2 ? e.deltaY * vp.clientHeight : e.deltaY;
          const factor = Math.exp(-delta * this.wheelSensitivity * this.zoomBoost);
          this.zoomToward(e.clientX - rect.left, e.clientY - rect.top, factor);
        };
        this.onTouchStart = (e) => {
          if (e.touches.length === 1) {
            this.dragging = true;
            this.lastX = e.touches[0].clientX;
            this.lastY = e.touches[0].clientY;
          } else if (e.touches.length === 2) {
            this.dragging = false;
            this.pinchDist = Math.hypot(
              e.touches[0].clientX - e.touches[1].clientX,
              e.touches[0].clientY - e.touches[1].clientY
            );
          }
        };
        this.onTouchMove = (e) => {
          if (e.touches.length === 1 && this.dragging) {
            e.preventDefault();
            const dx = e.touches[0].clientX - this.lastX;
            const dy = e.touches[0].clientY - this.lastY;
            this.lastX = e.touches[0].clientX;
            this.lastY = e.touches[0].clientY;
            this.targetX += dx;
            this.targetY += dy;
          } else if (e.touches.length === 2) {
            e.preventDefault();
            const dist = Math.hypot(
              e.touches[0].clientX - e.touches[1].clientX,
              e.touches[0].clientY - e.touches[1].clientY
            );
            const ratio = Math.max(0.92, Math.min(1.08, dist / Math.max(1, this.pinchDist)));
            this.pinchDist = dist;
            const rect = vp.getBoundingClientRect();
            const cx = (e.touches[0].clientX + e.touches[1].clientX) * 0.5 - rect.left;
            const cy = (e.touches[0].clientY + e.touches[1].clientY) * 0.5 - rect.top;
            this.zoomToward(cx, cy, ratio);
          }
        };
        this.onTouchEnd = () => {
          this.dragging = false;
          vp.classList.remove('grabbing');
        };
        vp.addEventListener('mousedown', this.onMouseDown, { passive: true });
        window.addEventListener('mousemove', this.onMouseMove, { passive: true });
        window.addEventListener('mouseup', this.onMouseUp, { passive: true });
        vp.addEventListener('wheel', this.onWheel, { passive: false });
        vp.addEventListener('touchstart', this.onTouchStart, { passive: true });
        vp.addEventListener('touchmove', this.onTouchMove, { passive: false });
        vp.addEventListener('touchend', this.onTouchEnd, { passive: true });
      }
      setZoomBoost(boost) {
        this.zoomBoost = boost;
      }
      setView(x, y, scale) {
        this.x = x;
        this.y = y;
        this.scale = scale;
        this.targetX = x;
        this.targetY = y;
        this.targetScale = scale;
      }
      zoomToward(cx, cy, factor) {
        const nextScale = this.clamp(this.targetScale * factor);
        const ratio = nextScale / Math.max(0.0001, this.targetScale);
        this.targetX = cx - (cx - this.targetX) * ratio;
        this.targetY = cy - (cy - this.targetY) * ratio;
        this.targetScale = nextScale;
        if (this.onZoomChange) this.onZoomChange(nextScale);
      }
      getScale() {
        return this.scale;
      }
      getOffset() {
        return { x: this.x, y: this.y };
      }
      loop() {
        const tick = (ts) => {
          const t = ts * 0.001;
          if (!this.dragging) {
            this.targetX += this.vx;
            this.targetY += this.vy;
            this.vx *= this.friction;
            this.vy *= this.friction;
          }
          this.floatX = Math.cos(t * 0.09) * 3.4;
          this.floatY = Math.sin(t * 0.07) * 2.2;
          this.x += (this.targetX + this.floatX - this.x) * 0.08;
          this.y += (this.targetY + this.floatY - this.y) * 0.08;
          this.scale += (this.targetScale - this.scale) * 0.1;
          this.world.style.transform = `translate3d(${this.x}px, ${this.y}px, 0) scale(${this.scale})`;
          this.raf = requestAnimationFrame(tick);
        };
        this.raf = requestAnimationFrame(tick);
      }
      clamp(value) {
        return Math.max(this.minScale, Math.min(this.maxScale, value));
      }
    }

    class CosmicApp {
      constructor() {
        this.viewport = document.getElementById('viewport');
        this.world = document.getElementById('world');
        this.focusReadout = document.getElementById('focus-readout');
        this.zoomReadout = document.getElementById('zoom-readout');
        this.hint = document.getElementById('world-hint');
        this.warp = document.getElementById('warp-overlay');
        this.minimap = document.getElementById('minimap');
        this.objects = [...PLANETS, BLACK_HOLE];
        this.items = [];
        this.positions = [];
        this.startTime = performance.now();
        this.currentFocus = null;
        this.currentBlackHoleDepth = 0;
        this.initializedView = false;
        this.activeVideoIds = new Set();
      }
      init() {
        this.starfield = new Starfield(document.getElementById('starfield'));
        this.camera = new ViewportEngine(this.world, this.viewport);
        this.camera.onZoomChange = (scale) => {
          this.zoomReadout.textContent = Math.round(scale * 100) + '%';
        };
        this.buildScene();
        this.buildMinimap();
        this.bindEvents();
        const loop = (ts) => {
          this.updateScene(ts);
          this.updateMinimap();
          requestAnimationFrame(loop);
        };
        requestAnimationFrame(loop);
      }
      bindEvents() {
        window.addEventListener('keydown', (e) => {
          if (e.key === 'r' || e.key === 'R') {
            const target = this.items.find((item) => item.data.id === WORLD_CONFIG.initialPlanetId);
            if (target) this.setInitialView(target);
          }
        }, { passive: true });
      }
      buildScene() {
        const radii = [...new Set(this.objects.map((obj) => obj.radius))].sort((a, b) => a - b);
        radii.forEach((radius) => {
          const ring = document.createElement('div');
          ring.className = 'orbit-ring';
          ring.style.width = `${radius * 2}px`;
          ring.style.height = `${radius * 2 * 0.14}px`;
          this.world.appendChild(ring);
        });

        const sun = document.createElement('div');
        sun.id = 'sun-source';
        sun.innerHTML = '<div class="sun-disc"></div><div class="sun-field"></div>';
        this.world.appendChild(sun);

        this.items = this.objects.map((obj) => {
          const wrap = document.createElement('article');
          wrap.className = obj.id === BLACK_HOLE.id ? 'space-object black-hole-object' : 'space-object';
          wrap.dataset.id = obj.id;
          wrap.style.setProperty('--planet-base', obj.albedo);
          wrap.style.setProperty('--detail-color', obj.detailColor);

          const planet = document.createElement('div');
          planet.className = obj.id === BLACK_HOLE.id ? 'planet-shell black-hole-shell' : `planet-shell material-${obj.material}`;
          planet.style.width = `${obj.size}px`;
          planet.style.height = `${obj.size}px`;
          if (obj.id === BLACK_HOLE.id) {
            planet.innerHTML = '<div class="lensing-ring"></div><div class="singularity-core"></div><div class="lensing-halo"></div>';
          } else {
            planet.innerHTML = '<div class="surface-noise"></div><div class="surface-shadow"></div>';
          }

          const label = document.createElement('div');
          label.className = 'planet-label';
          label.innerHTML = `<span class="planet-name">${obj.name}</span><span class="planet-subtitle">${obj.subtitle}</span>`;

          const shell = document.createElement('div');
          shell.className = 'content-shell';
          shell.innerHTML = `
            <div class="zoom-layer zoom-layer-2">
              <div class="content-card intro-card">
                <span class="content-eyebrow">Approach</span>
                <h3>${obj.name}</h3>
                <p>${obj.prompt}</p>
              </div>
            </div>
            <div class="zoom-layer zoom-layer-3">${obj.preview()}</div>
            <div class="zoom-layer zoom-layer-4"></div>
            <div class="zoom-layer zoom-layer-5"></div>
          `;

          wrap.appendChild(planet);
          wrap.appendChild(label);
          wrap.appendChild(shell);
          this.world.appendChild(wrap);

          return {
            data: obj,
            el: wrap,
            planet,
            shell,
            surfaceEl: shell.querySelector('.zoom-layer-4'),
            deepEl: shell.querySelector('.zoom-layer-5'),
            surfaceLoaded: false,
            deepLoaded: false,
            videoLoaded: false,
            videoPlaying: false,
            videoEl: null,
            localDepth: 0,
            screenX: 0,
            screenY: 0,
          };
        });
      }
      buildMinimap() {
        const canvas = document.createElement('canvas');
        canvas.width = 240;
        canvas.height = 240;
        canvas.style.width = '120px';
        canvas.style.height = '120px';
        this.minimap.appendChild(canvas);
        this.mmCanvas = canvas;
        this.mmCtx = canvas.getContext('2d');
      }
      ensureVideo(item) {
        if (item.videoLoaded) return;
        const stage = document.createElement('div');
        stage.className = 'video-stage';
        stage.innerHTML = `
          <div class="video-frame">
            <video muted playsinline loop preload="none" poster="${item.data.video.poster}"></video>
            <div class="video-overlay"></div>
          </div>
        `;
        item.surfaceEl.prepend(stage);
        item.videoEl = stage.querySelector('video');
        item.videoEl.src = item.data.video.src;
        item.videoLoaded = true;
      }
      updateVideo(item, shouldPlay) {
        if (!item.data.video) return;
        if (shouldPlay) {
          this.ensureVideo(item);
          if (!item.videoPlaying) {
            item.videoEl.play().catch(() => {});
            item.videoPlaying = true;
          }
          item.el.classList.add('video-active');
        } else if (item.videoLoaded && item.videoPlaying) {
          item.videoEl.pause();
          item.videoPlaying = false;
          item.el.classList.remove('video-active');
        } else {
          item.el.classList.remove('video-active');
        }
      }
      setInitialView(item) {
        const pos = this.positions.find((entry) => entry.id === item.data.id);
        if (!pos) return;
        const scale = 2.35;
        const targetX = window.innerWidth * 0.68 - pos.x * scale;
        const targetY = window.innerHeight * 0.56 - pos.y * scale;
        this.camera.setView(targetX - window.innerWidth * 0.5, targetY - window.innerHeight * 0.5, scale);
        this.initializedView = true;
      }
      updateScene(ts) {
        const t = (ts - this.startTime) * 0.00014;
        const centerX = window.innerWidth * 0.5;
        const centerY = window.innerHeight * 0.5;
        let focus = null;
        let focusScore = -1;
        let blackHoleDepth = 0;
        this.positions = [];

        for (const item of this.items) {
          const obj = item.data;
          const angle = t * obj.speed * 60 + obj.phase;
          const x = Math.cos(angle) * obj.radius;
          const y = Math.sin(angle) * obj.radius * obj.tilt;
          const depth = y / Math.max(1, obj.radius * obj.tilt);
          const orbitScale = 0.84 + (depth + 1) * 0.19;
          const blur = Math.max(0, (1 - (depth + 1) * 0.5) * 0.9);
          item.el.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px)) scale(${orbitScale.toFixed(3)})`;
          item.el.style.zIndex = `${Math.round(2000 + depth * 1200)}`;
          item.el.style.filter = `blur(${blur.toFixed(2)}px)`;

          const apparent = obj.size * this.camera.getScale() * orbitScale;
          const screenX = centerX + this.camera.x + x * this.camera.getScale();
          const screenY = centerY + this.camera.y + y * this.camera.getScale();
          item.screenX = screenX;
          item.screenY = screenY;
          const dist = Math.hypot(screenX - centerX, screenY - centerY);
          const proximity = this.smoothstep(1, 0, dist / (Math.min(window.innerWidth, window.innerHeight) * 0.7));
          const localDepth = (apparent / 50) * (0.45 + proximity * 0.55);
          item.localDepth = localDepth;

          item.el.style.setProperty('--reveal-2', this.smoothstep(0.75, 1.25, localDepth).toFixed(3));
          item.el.style.setProperty('--reveal-3', this.smoothstep(1.2, 2.0, localDepth).toFixed(3));
          item.el.style.setProperty('--reveal-4', this.smoothstep(2.2, 3.8, localDepth).toFixed(3));
          item.el.style.setProperty('--reveal-5', this.smoothstep(4.2, 6.6, localDepth).toFixed(3));
          item.el.style.setProperty('--shell-scale', (0.96 + this.smoothstep(1.1, 6.4, localDepth) * 0.1).toFixed(3));
          item.el.style.setProperty('--planet-shadow', (0.48 - depth * 0.08).toFixed(3));
          item.el.style.setProperty('--planet-light', (0.24 + (depth + 1) * 0.08).toFixed(3));

          if (localDepth > 2.4 && !item.surfaceLoaded) {
            item.surfaceEl.innerHTML += obj.surface();
            item.surfaceLoaded = true;
          }
          if (localDepth > 4.6 && !item.deepLoaded) {
            item.deepEl.innerHTML = obj.deep();
            item.deepLoaded = true;
          }

          const shouldPlayVideo = localDepth > 2.8 && proximity > 0.42;
          this.updateVideo(item, shouldPlayVideo);

          const score = localDepth * (0.4 + proximity * 0.6);
          if (score > focusScore) {
            focusScore = score;
            focus = item;
          }
          if (obj.id === BLACK_HOLE.id) blackHoleDepth = localDepth;
          this.positions.push({ id: obj.id, x, y, color: obj.albedo });
        }

        if (!this.initializedView) {
          const startItem = this.items.find((item) => item.data.id === WORLD_CONFIG.initialPlanetId) || this.items[0];
          this.setInitialView(startItem);
        }

        this.currentFocus = focus;
        this.currentBlackHoleDepth = blackHoleDepth;
        this.camera.setZoomBoost(1 + this.smoothstep(1.2, 4.8, blackHoleDepth) * 1.4);
        this.warp.style.opacity = this.smoothstep(1.4, 6.0, blackHoleDepth).toFixed(3);
        this.starfield.setWarp(this.smoothstep(1.6, 6.2, blackHoleDepth));
        this.starfield.setParallax(this.camera.x, this.camera.y);
        this.updateReadout(focus, blackHoleDepth);
      }
      updateReadout(focus, blackHoleDepth) {
        if (!focus) return;
        this.focusReadout.textContent = `${focus.data.name} - ${focus.data.subtitle}`;
        if (focus.data.id === BLACK_HOLE.id && blackHoleDepth > 2.2) {
          this.hint.textContent = blackHoleDepth > 5
            ? 'The archive is collapsing inward. Keep drifting if you want the deepest process notes.'
            : 'Space is bending around the singularity. Scroll carefully through the lensing ring.';
          return;
        }
        if (focus.localDepth < 1.1) {
          this.hint.textContent = WORLD_CONFIG.hint;
        } else if (focus.localDepth < 2.2) {
          this.hint.textContent = `${focus.data.name} is resolving out of the dark. Stay near it and keep moving forward.`;
        } else if (focus.localDepth < 4.4) {
          this.hint.textContent = `${focus.data.name} surface layer active. Content and video will deepen as you keep approaching.`;
        } else {
          this.hint.textContent = `${focus.data.name} deep layer active. Zoom back out to re-enter the wider system.`;
        }
      }
      updateMinimap() {
        const ctx = this.mmCtx;
        const W = 120;
        const H = 120;
        ctx.setTransform(2, 0, 0, 2, 0, 0);
        ctx.clearRect(0, 0, W, H);
        ctx.fillStyle = 'rgba(5, 8, 16, 0.88)';
        ctx.fillRect(0, 0, W, H);
        const worldRadius = 1260;
        const scale = Math.min(W, H) / (worldRadius * 2.5);
        const cx = W / 2;
        const cy = H / 2;
        ctx.strokeStyle = 'rgba(255,255,255,0.06)';
        ctx.lineWidth = 0.5;
        this.objects.forEach((obj) => {
          ctx.beginPath();
          ctx.ellipse(cx, cy, obj.radius * scale, obj.radius * scale * 0.14, 0, 0, Math.PI * 2);
          ctx.stroke();
        });
        this.positions.forEach((pos) => {
          ctx.beginPath();
          ctx.arc(cx + pos.x * scale, cy + pos.y * scale * 0.14, pos.id === BLACK_HOLE.id ? 3.6 : 2.5, 0, Math.PI * 2);
          ctx.fillStyle = pos.id === BLACK_HOLE.id ? '#9fb6d8' : pos.color;
          ctx.fill();
        });
        ctx.beginPath();
        ctx.arc(cx, cy, 3.4, 0, Math.PI * 2);
        ctx.fillStyle = '#f2d5a0';
        ctx.fill();

        const cameraScale = this.camera.getScale();
        const off = this.camera.getOffset();
        const worldX = (-off.x) / cameraScale;
        const worldY = (-off.y) / cameraScale;
        const viewportW = window.innerWidth / cameraScale;
        const viewportH = window.innerHeight / cameraScale;
        ctx.strokeStyle = 'rgba(173, 191, 220, 0.84)';
        ctx.lineWidth = 0.8;
        ctx.strokeRect(
          cx + (worldX - window.innerWidth * 0.5 / cameraScale) * scale,
          cy + (worldY - window.innerHeight * 0.5 / cameraScale) * scale * 0.14,
          viewportW * scale,
          viewportH * scale * 0.14
        );
      }
      smoothstep(min, max, value) {
        const x = Math.max(0, Math.min(1, (value - min) / Math.max(0.0001, max - min)));
        return x * x * (3 - 2 * x);
      }
    }

    new CosmicApp().init();
  </script>
</body>
