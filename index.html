<script type="module">

/* ── Inline engine modules (avoids module bundler requirement) ── */

/* ════════════════ STARFIELD ════════════════ */
class Starfield {
  constructor(canvas) {
    this.canvas = canvas;
    this.ctx    = canvas.getContext('2d', { alpha: false });
    const mob = window.innerWidth < 700;
    this.STATIC_COUNT  = mob ? 220 : 420;
    this.TWINKLE_COUNT = mob ? 16  : 32;
    this.LAYER_COUNTS  = mob ? [36, 26, 16] : [88, 58, 34];
    this.offscreen = document.createElement('canvas');
    this.offCtx    = this.offscreen.getContext('2d', { alpha: false });
    this._shooters = [];
    this._nextShooterAt = 0;
    this._prevTs = 0;
    this._running  = false;
    this._raf      = null;
    this._init();
  }
  _init() {
    this._resize(); this._buildStars(); this._renderOffscreen(); this._startLoop();
    window.addEventListener('resize', () => {
      this._resize(); this._buildStars(); this._renderOffscreen();
    }, { passive: true });
  }
  _resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    this.dpr = dpr; this.w = window.innerWidth; this.h = window.innerHeight;
    [this.canvas, this.offscreen].forEach(c => {
      c.width  = this.w * dpr; c.height = this.h * dpr;
      c.style.width = this.w + 'px'; c.style.height = this.h + 'px';
    });
    this.ctx.setTransform(dpr,0,0,dpr,0,0);
    this.offCtx.setTransform(dpr,0,0,dpr,0,0);
  }
  _buildStars() {
    const { w, h } = this;
    this.staticBuf = new Float32Array(this.STATIC_COUNT * 4);
    for (let i = 0; i < this.STATIC_COUNT; i++) {
      const b = i * 4;
      this.staticBuf[b]   = Math.random() * w;
      this.staticBuf[b+1] = Math.random() * h;
      this.staticBuf[b+2] = Math.random() * 1.2 + 0.2;
      this.staticBuf[b+3] = Math.random() * 0.6 + 0.2;
    }
    this.twinklers = Array.from({ length: this.TWINKLE_COUNT }, () => ({
      x: Math.random() * w, y: Math.random() * h,
      r: Math.random() * 1.5 + 0.5,
      phase: Math.random() * Math.PI * 2,
      speed: (Math.random() * 0.6 + 0.3) * 0.01,
    }));
    const maxOrbit = Math.hypot(w, h) * 0.62;
    this.layers = this.LAYER_COUNTS.map((count, li) => {
      const depth = li + 1;
      const layerVelocity = 0.12 - li * 0.028;
      return Array.from({ length: count }, () => {
        const isWarm = Math.random() < 0.18;
        const orbit = Math.pow(Math.random(), 0.72) * maxOrbit;
        return {
          x: 0,
          y: 0,
          r: Math.random() * (0.45 + depth * 0.28) + 0.25,
          a: Math.random() * 0.6 + 0.25,
          orbit,
          angle: Math.random() * 6.2832,
          vel: (Math.random() * 0.45 + 0.8) * layerVelocity * (1 - Math.min(0.72, orbit / maxOrbit) * 0.35),
          flatten: 0.62 + Math.random() * 0.28,
          arm: Math.random() * 8 + 2,
          pulse: Math.random() * Math.PI * 2,
          twinkle: Math.random() * Math.PI * 2,
          twinkleSpeed: Math.random() * 1.2 + 0.5,
          color: isWarm ? [255, 235, 200] : [208, 225, 255],
        };
      });
    });
    this._shooters.length = 0;
    this._nextShooterAt = performance.now() + (Math.random() * 3500 + 2000);
    this._prevTs = 0;
  }
  _renderOffscreen() {
    const ctx = this.offCtx; const { w, h } = this;
    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = '#03040b'; ctx.fillRect(0, 0, w, h);
    [
      [w*0.15, h*0.25, w*0.26, 'rgba(52,40,125,0.22)'],
      [w*0.82, h*0.65, w*0.20, 'rgba(22,90,132,0.16)'],
      [w*0.55, h*0.80, w*0.28, 'rgba(95,26,118,0.13)'],
      [w*0.36, h*0.56, w*0.23, 'rgba(35,52,140,0.10)'],
    ].forEach(([bx, by, br, bc]) => {
      const g = ctx.createRadialGradient(bx,by,0,bx,by,br);
      g.addColorStop(0, bc); g.addColorStop(1, 'transparent');
      ctx.fillStyle = g; ctx.fillRect(0,0,w,h);
    });
    const buf = this.staticBuf;
    for (let i = 0; i < this.STATIC_COUNT; i++) {
      const b = i * 4;
      ctx.beginPath();
      ctx.arc(buf[b], buf[b+1], buf[b+2], 0, 6.2832);
      ctx.fillStyle = `rgba(220,230,255,${buf[b+3].toFixed(2)})`;
      ctx.fill();
    }
  }
  _spawnShooter(now) {
    const y = Math.random() * this.h * 0.55;
    const x = Math.random() * this.w * 0.55;
    this._shooters.push({
      x, y,
      vx: Math.random() * 520 + 760,
      vy: Math.random() * 130 + 180,
      life: 0,
      ttl: Math.random() * 0.55 + 0.45,
      len: Math.random() * 70 + 55,
    });
    this._nextShooterAt = now + (Math.random() * 4500 + 2800);
  }
  _startLoop() {
    this._running = true;
    const tick = (ts) => {
      if (!this._running) return;
      const t = ts * 0.001;
      const dt = this._prevTs ? Math.min(0.05, (ts - this._prevTs) * 0.001) : 0.016;
      this._prevTs = ts;
      const ctx = this.ctx; const { w, h } = this;
      ctx.drawImage(this.offscreen, 0, 0, w, h);
      const cx = w * 0.5 + Math.cos(t * 0.08) * w * 0.018;
      const cy = h * 0.5 + Math.sin(t * 0.06) * h * 0.014;

      for (const layer of this.layers) {
        for (const s of layer) {
          s.angle += s.vel * dt;
          const pulse = Math.sin(t * 0.42 + s.pulse) * s.arm;
          const orbit = s.orbit + pulse;
          s.x = cx + Math.cos(s.angle) * orbit;
          s.y = cy + Math.sin(s.angle) * orbit * s.flatten;

          const tw = 0.7 + 0.3 * Math.sin(t * s.twinkleSpeed + s.twinkle);
          const alpha = Math.min(1, s.a * tw);
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, 6.2832);
          ctx.fillStyle = `rgba(${s.color[0]},${s.color[1]},${s.color[2]},${alpha.toFixed(3)})`;
          ctx.fill();

          if (s.r > 1.25) {
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r * 2.8, 0, 6.2832);
            ctx.fillStyle = `rgba(${s.color[0]},${s.color[1]},${s.color[2]},${(alpha * 0.13).toFixed(3)})`;
            ctx.fill();
          }
        }
      }

      for (const s of this.twinklers) {
        const op = 0.35 + 0.65 * (0.5 + 0.5 * Math.sin(t * s.speed * 628 + s.phase));
        ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, 6.2832);
        ctx.fillStyle = `rgba(210,220,255,${op.toFixed(2)})`; ctx.fill();
      }

      if (ts > this._nextShooterAt && this._shooters.length < 3) {
        this._spawnShooter(ts);
      }
      if (this._shooters.length) {
        const keep = [];
        for (const sh of this._shooters) {
          sh.life += dt;
          sh.x += sh.vx * dt;
          sh.y += sh.vy * dt;
          if (sh.life < sh.ttl && sh.x < w + sh.len && sh.y < h + sh.len) {
            const p = sh.life / sh.ttl;
            const alpha = (1 - p) * 0.55;
            const tx = sh.x - sh.len * 0.9;
            const ty = sh.y - sh.len * 0.38;
            const g = ctx.createLinearGradient(sh.x, sh.y, tx, ty);
            g.addColorStop(0, `rgba(255,245,214,${alpha.toFixed(3)})`);
            g.addColorStop(1, 'rgba(255,245,214,0)');
            ctx.lineWidth = 1.6;
            ctx.strokeStyle = g;
            ctx.beginPath();
            ctx.moveTo(sh.x, sh.y);
            ctx.lineTo(tx, ty);
            ctx.stroke();
            keep.push(sh);
          }
        }
        this._shooters = keep;
      }
      this._raf = requestAnimationFrame(tick);
    };
    this._raf = requestAnimationFrame(tick);
  }
  destroy() { this._running = false; cancelAnimationFrame(this._raf); }
}

/* ════════════════ VIEWPORT ENGINE ════════════════ */
class ViewportEngine {
  constructor(worldEl, viewportEl) {
    this.world = worldEl; this.viewport = viewportEl;
    this.x = 0; this.y = 0; this.scale = 0.55;
    this.targetX = 0; this.targetY = 0; this.targetScale = 0.55;
    this.MIN_SCALE = 0.18; this.MAX_SCALE = 3.2;
    this.vx = 0; this.vy = 0; this.FRICTION = 0.88;
    this.ZOOM_WHEEL_SENSITIVITY = 0.0016;
    this._dragging = false; this._lastX = 0; this._lastY = 0;
    this._pinchDist = 0; this._running = false; this._raf = null;
    this.onZoomChange = null;
    this._bindEvents(); this._startLoop();
  }
  zoomTo(wx, wy, scale) {
    const vW = this.viewport.offsetWidth; const vH = this.viewport.offsetHeight;
    this.targetScale = this._clamp(scale);
    this.targetX = -wx * this.targetScale + vW / 2;
    this.targetY = -wy * this.targetScale + vH / 2;
    this.vx = 0; this.vy = 0;
    if (this.onZoomChange) this.onZoomChange(this.targetScale);
  }
  reset() {
    this.targetX = 0; this.targetY = 0; this.targetScale = 0.55;
    this.vx = 0; this.vy = 0;
    if (this.onZoomChange) this.onZoomChange(this.targetScale);
  }
  zoomBy(f, cx = this.viewport.offsetWidth * 0.5, cy = this.viewport.offsetHeight * 0.5) {
    this._zoomAround(cx, cy, f);
  }
  getScale()  { return this.scale; }
  getOffset() { return { x: this.x, y: this.y }; }
  _startLoop() {
    this._running = true;
    const tick = () => {
      if (!this._running) return;
      const EASE = 0.10;
      if (!this._dragging) {
        this.targetX += this.vx; this.targetY += this.vy;
        this.vx *= this.FRICTION; this.vy *= this.FRICTION;
      }
      this.x     += (this.targetX - this.x)     * EASE;
      this.y     += (this.targetY - this.y)     * EASE;
      this.scale += (this.targetScale - this.scale) * EASE;
      this.world.style.transform = `translate(${this.x}px,${this.y}px) scale(${this.scale})`;
      this._raf = requestAnimationFrame(tick);
    };
    this._raf = requestAnimationFrame(tick);
  }
  _bindEvents() {
    const vp = this.viewport;
    this._onMD = e => { if(e.button!==0)return; this._dragging=true; this._lastX=e.clientX; this._lastY=e.clientY; this.vx=0;this.vy=0; vp.classList.add('grabbing'); };
    this._onMM = e => { if(!this._dragging)return; const dx=e.clientX-this._lastX,dy=e.clientY-this._lastY; this._lastX=e.clientX;this._lastY=e.clientY; this.targetX+=dx;this.targetY+=dy;this.vx=dx;this.vy=dy; };
    this._onMU = () => { this._dragging=false; vp.classList.remove('grabbing'); };
    this._onWH = e => {
      e.preventDefault();
      const r = vp.getBoundingClientRect();
      const d = this._wheelDeltaPx(e);
      const f = Math.exp(-d * this.ZOOM_WHEEL_SENSITIVITY);
      this._zoomAround(e.clientX - r.left, e.clientY - r.top, f);
    };
    this._onTS = e => { if(e.touches.length===1){this._dragging=true;this._lastX=e.touches[0].clientX;this._lastY=e.touches[0].clientY;this.vx=0;this.vy=0;}else if(e.touches.length===2){this._dragging=false;this._pinchDist=this._pDist(e.touches);} };
    this._onTM = e => { if(e.touches.length===1&&this._dragging){e.preventDefault();const dx=e.touches[0].clientX-this._lastX,dy=e.touches[0].clientY-this._lastY;this._lastX=e.touches[0].clientX;this._lastY=e.touches[0].clientY;this.targetX+=dx;this.targetY+=dy;this.vx=dx;this.vy=dy;}else if(e.touches.length===2){e.preventDefault();const d=this._pDist(e.touches);const r=Math.max(0.92,Math.min(1.08,d/this._pinchDist));this._pinchDist=d;const rect=vp.getBoundingClientRect();const cx=(e.touches[0].clientX+e.touches[1].clientX)/2-rect.left,cy=(e.touches[0].clientY+e.touches[1].clientY)/2-rect.top;this._zoomAround(cx,cy,r);} };
    this._onTE = () => { this._dragging=false; };
    vp.addEventListener('mousedown',  this._onMD, {passive:true});
    window.addEventListener('mousemove', this._onMM, {passive:true});
    window.addEventListener('mouseup',   this._onMU, {passive:true});
    vp.addEventListener('wheel',      this._onWH, {passive:false});
    vp.addEventListener('touchstart', this._onTS, {passive:true});
    vp.addEventListener('touchmove',  this._onTM, {passive:false});
    vp.addEventListener('touchend',   this._onTE, {passive:true});
  }
  _zoomAround(cx, cy, f) {
    const ns = this._clamp(this.targetScale * f);
    const r  = ns / Math.max(0.0001, this.targetScale);
    this.targetX = cx - (cx - this.targetX) * r;
    this.targetY = cy - (cy - this.targetY) * r;
    this.targetScale = ns;
    if (this.onZoomChange) this.onZoomChange(ns);
  }
  _wheelDeltaPx(e) {
    if (e.deltaMode === 1) return e.deltaY * 16;
    if (e.deltaMode === 2) return e.deltaY * this.viewport.clientHeight;
    return e.deltaY;
  }
  _clamp(s)      { return Math.max(this.MIN_SCALE, Math.min(this.MAX_SCALE, s)); }
  _pDist(t)      { return Math.hypot(t[0].clientX-t[1].clientX, t[0].clientY-t[1].clientY); }
  destroy()      { this._running=false; cancelAnimationFrame(this._raf); }
}

/* ════════════════ APP ════════════════ */
class CosmicApp {
  constructor() {
    this.world    = document.getElementById('world');
    this.viewport = document.getElementById('viewport');
    this.panel    = document.getElementById('content-panel');
    this.panelDot = document.getElementById('panel-dot');
    this.panelTitle = document.getElementById('panel-title');
    this.panelSub   = document.getElementById('panel-subtitle');
    this.panelBody  = document.getElementById('panel-body');
    this.panelClose = document.getElementById('panel-close');
    this.zoomReadout = document.getElementById('zoom-readout');
    this.minimap  = document.getElementById('minimap');
    this.quicknav = document.getElementById('quicknav');
    this.tooltip  = document.getElementById('tooltip');
    this.warp     = document.getElementById('warp-overlay');

    this.activePlanetId = null;
    this.tourActive     = false;
    this.tourIndex      = 0;
    this._tourTimer     = null;
    this.orbitSpeed     = 0.00008;
    this.orbitFast      = false;

    /* Orbit state */
    this._startT = performance.now();
    this._planetEls = [];

    /* Minimap canvas */
    this._mmCanvas = null;
    this._mmCtx    = null;

    this._raf = null;
    this._running = false;
  }

  init() {
    /* Engines */
    this.sf  = new Starfield(document.getElementById('starfield'));
    this.vp  = new ViewportEngine(this.world, this.viewport);
    this.vp.onZoomChange = s => this._onZoomChange(s);

    /* Build scene */
    this._buildScene();
    this._buildMinimap();
    this._buildQuickNav();
    this._bindUI();

    /* Main loop */
    this._running = true;
    const tick = (ts) => {
      if (!this._running) return;
      this._updateOrbits(ts);
      this._updateMinimap();
      this._updateZoomReadout();
      this._raf = requestAnimationFrame(tick);
    };
    this._raf = requestAnimationFrame(tick);
  }

  /* ─── SCENE BUILD ──────────────────────────────── */

  _buildScene() {
    /* Orbit rings */
    const rings = [...new Set(PLANETS.map(p => p.radius))].sort((a,b)=>a-b);
    rings.forEach(r => {
      const el = document.createElement('div');
      el.className = 'orbit-ring';
      el.style.cssText = `width:${r*2}px;height:${r*2*0.13}px;`;
      this.world.appendChild(el);
    });

    /* Sun */
    const sunWrap = document.createElement('div');
    sunWrap.id = 'sun-wrapper';
    sunWrap.innerHTML = `
      <div id="sun">
        <div class="planet-shine"></div>
      </div>
      <div id="sun-pulse"></div>`;
    this.world.appendChild(sunWrap);
    sunWrap.querySelector('#sun').addEventListener('click', () => this.vp.reset());

    /* Planets */
    this._planetEls = PLANETS.map(p => {
      const wrap = document.createElement('div');
      wrap.className = 'planet-wrapper';
      wrap.dataset.id = p.id;

      const planet = document.createElement('div');
      planet.className = 'planet';
      planet.style.cssText = `width:${p.size}px;height:${p.size}px;background:${p.gradient};box-shadow:0 0 ${p.size*0.5}px ${p.size*0.2}px ${p.color}44;`;
      planet.style.setProperty('--planet-color', p.color);
      planet.style.setProperty('--planet-spin', `${(22 + Math.random() * 22).toFixed(2)}s`);

      const inner = document.createElement('div');
      inner.className = 'planet-inner';
      inner.innerHTML = `<div class="planet-shine"></div>`;
      planet.appendChild(inner);

      let ring = null;
      if (p.id === 'projects') {
        ring = document.createElement('div');
        ring.className = 'planet-ring';
        ring.style.width = `${(p.size * 2.2).toFixed(1)}px`;
        ring.style.height = `${(p.size * 0.72).toFixed(1)}px`;
        ring.style.borderColor = `${p.color}a0`;
      }

      const label = document.createElement('div');
      label.className = 'planet-label';
      label.textContent = p.name;

      const sub = document.createElement('div');
      sub.className = 'planet-sublabel';
      sub.textContent = p.subtitle;

      wrap.appendChild(planet);
      if (ring) wrap.appendChild(ring);
      wrap.appendChild(label);
      wrap.appendChild(sub);
      this.world.appendChild(wrap);

      /* Click */
      planet.addEventListener('click', (e) => {
        e.stopPropagation();
        this._focusPlanet(p, wrap);
      });

      /* Hover tooltip */
      planet.addEventListener('mouseenter', () => {
        this.tooltip.textContent = `${p.name} — ${p.subtitle}`;
        this.tooltip.classList.add('show');
      });
      planet.addEventListener('mousemove', (e) => {
        this.tooltip.style.left = (e.clientX + 14) + 'px';
        this.tooltip.style.top  = (e.clientY - 28) + 'px';
      });
      planet.addEventListener('mouseleave', () => this.tooltip.classList.remove('show'));

      return { el: wrap, planet: p, planetEl: planet };
    });
  }

  /* ─── MINIMAP ─────────────────────────────────── */

  _buildMinimap() {
    const mm = this.minimap;
    const W = 110; const H = 110;
    const canvas = document.createElement('canvas');
    canvas.width  = W * 2; canvas.height = H * 2;
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    mm.appendChild(canvas);
    this._mmCanvas = canvas;
    this._mmCtx    = canvas.getContext('2d');
    this._mmCtx.scale(2, 2);
    this._mmW = W; this._mmH = H;

    /* Indicator */
    this._mmInd = document.createElement('div');
    this._mmInd.id = 'minimap-viewport-indicator';
    mm.appendChild(this._mmInd);
  }

  _updateMinimap() {
    const ctx = this._mmCtx;
    if (!ctx) return;
    const W = this._mmW; const H = this._mmH;
    const WORLD_R = 680;
    const scale = Math.min(W, H) / (WORLD_R * 2.4);
    const cx = W / 2; const cy = H / 2;

    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = 'rgba(4,5,13,0.5)';
    ctx.fillRect(0, 0, W, H);

    /* Rings */
    ctx.strokeStyle = 'rgba(255,255,255,0.07)'; ctx.lineWidth = 0.5;
    PLANETS.forEach(p => {
      ctx.beginPath();
      ctx.ellipse(cx, cy, p.radius * scale, p.radius * scale * 0.13, 0, 0, Math.PI * 2);
      ctx.stroke();
    });

    /* Sun */
    ctx.beginPath(); ctx.arc(cx, cy, 3.5, 0, Math.PI * 2);
    ctx.fillStyle = '#ffd47e'; ctx.fill();

    /* Planets at current positions */
    this._currentPositions && this._currentPositions.forEach(pos => {
      const p = PLANETS.find(p => p.id === pos.id);
      if (!p) return;
      const mx = cx + pos.x * scale;
      const my = cy + pos.y * scale * 0.13;
      ctx.beginPath(); ctx.arc(mx, my, 2.5, 0, Math.PI * 2);
      ctx.fillStyle = p.color; ctx.fill();
    });

    /* Viewport indicator */
    const vs = this.vp.getScale();
    const off = this.vp.getOffset();
    const vW = window.innerWidth; const vH = window.innerHeight;
    const worldW = vW / vs; const worldH = vH / vs;
    const worldX = (-off.x - vW/2) / vs;
    const worldY = (-off.y - vH/2) / vs;
    const ix = cx + worldX * scale;
    const iy = cy + worldY * scale * 0.13;
    const iw = worldW * scale; const ih = worldH * scale * 0.13;
    const ind = this._mmInd;
    ind.style.cssText = `left:${Math.max(0,ix)}px;top:${Math.max(0,iy)}px;width:${Math.min(iw,W-Math.max(0,ix))}px;height:${Math.min(ih,H-Math.max(0,iy))}px;`;
  }

  /* ─── QUICK NAV ───────────────────────────────── */

  _buildQuickNav() {
    /* Sun dot */
    const sunBtn = document.createElement('button');
    sunBtn.className = 'qn-btn';
    sunBtn.dataset.label = 'Home';
    sunBtn.style.background = '#ffd47e';
    sunBtn.addEventListener('click', () => this.vp.reset());
    this.quicknav.appendChild(sunBtn);

    PLANETS.forEach(p => {
      const btn = document.createElement('button');
      btn.className = 'qn-btn';
      btn.dataset.id = p.id;
      btn.dataset.label = p.name;
      btn.style.background = p.color + '80';
      btn.addEventListener('click', () => {
        const wr = this._planetEls.find(pe => pe.planet.id === p.id);
        if (wr) this._focusPlanet(p, wr.el);
      });
      this.quicknav.appendChild(btn);
    });
  }

  /* ─── ORBIT UPDATE ────────────────────────────── */

  _updateOrbits(ts) {
    const t = (ts - this._startT) * 0.001 * this.orbitSpeed * 10000 * 0.00008;
    const positions = [];

    const showLabels = this.vp.getScale() > 0.45;
    this.world.classList.toggle('show-labels', showLabels);

    this._planetEls.forEach(({ el, planet: p, planetEl }) => {
      const angle = t * p.speed + p.phase;
      const x = Math.cos(angle) * p.radius;
      const orbitTilt = (p.tilt ?? 0.13);
      const y = Math.sin(angle) * p.radius * orbitTilt;
      const depth = y / Math.max(1, p.radius * orbitTilt);
      const depthScale = 0.92 + ((depth + 1) * 0.12);
      const glowMul = 0.7 + ((depth + 1) * 0.22);
      const radiusGlow = (p.size * 0.5 * glowMul).toFixed(2);
      const blurGlow = (p.size * 0.2 * glowMul).toFixed(2);

      el.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px)) scale(${depthScale.toFixed(3)})`;
      el.style.zIndex = `${Math.round(2000 + depth * 1000)}`;
      planetEl.style.boxShadow = `0 0 ${radiusGlow}px ${blurGlow}px ${p.color}44`;
      planetEl.style.setProperty('--planet-atmo', `${(0.32 + (depth + 1) * 0.11).toFixed(3)}`);

      const len = Math.hypot(x, y) || 1;
      const lightX = (-x / len);
      const lightY = (-y / len);
      planetEl.style.setProperty('--sun-x', `${(50 + lightX * 28).toFixed(2)}%`);
      planetEl.style.setProperty('--sun-y', `${(50 + lightY * 28).toFixed(2)}%`);
      positions.push({ id: p.id, x, y });
    });

    this._currentPositions = positions;
  }

  /* ─── ZOOM/FOCUS ──────────────────────────────── */

  _focusPlanet(p, wrapEl) {
    if (this.tourActive) this._stopTour();

    /* Use live orbit math position when available (more robust than parsing transform text) */
    const livePos = this._currentPositions && this._currentPositions.find(pos => pos.id === p.id);
    const style = wrapEl.style.transform;
    const match = style.match(/translate\(calc\(-50% \+ ([-\d.]+)px\), calc\(-50% \+ ([-\d.]+)px\)\)/);
    const wx = livePos ? livePos.x : (match ? parseFloat(match[1]) : 0);
    const wy = livePos ? livePos.y : (match ? parseFloat(match[2]) : 0);

    /* Planet view: adaptive zoom + panel-aware framing */
    const targetScale = Math.max(1.55, Math.min(2.35, 90 / Math.max(24, p.size)));
    const hasSidePanel = window.innerWidth >= 980;
    const panelOffsetPx = hasSidePanel ? Math.min(180, window.innerWidth * 0.16) : 0;
    const focusX = wx + (panelOffsetPx / targetScale);
    const focusY = wy;

    this._warpEffect();
    this.vp.zoomTo(focusX, focusY, targetScale);

    /* Panel */
    this.activePlanetId = p.id;
    this.panelDot.style.cssText   = `background:${p.color};box-shadow:0 0 10px ${p.color}`;
    this.panelTitle.textContent   = p.name;
    this.panelSub.textContent     = p.subtitle;
    this.panelBody.innerHTML      = p.content();
    this.panel.classList.add('visible');

    /* Quick nav active state */
    this.quicknav.querySelectorAll('.qn-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.id === p.id);
    });
  }

  _hidePanel() {
    this.panel.classList.remove('visible');
    this.activePlanetId = null;
    this.quicknav.querySelectorAll('.qn-btn').forEach(b => b.classList.remove('active'));
    setTimeout(() => { this.panelBody.innerHTML = ''; }, 450);
  }

  /* ─── WARP EFFECT ─────────────────────────────── */

  _warpEffect() {
    this.warp.classList.add('active');
    setTimeout(() => this.warp.classList.remove('active'), 500);
  }

  /* ─── AUTO TOUR ───────────────────────────────── */

  _startTour() {
    this.tourActive = true;
    document.getElementById('btn-tour').classList.add('active');
    this.tourIndex = 0;
    this._nextTourStep();
  }

  _nextTourStep() {
    if (!this.tourActive) return;
    const p = PLANETS[this.tourIndex % PLANETS.length];
    const wr = this._planetEls.find(pe => pe.planet.id === p.id);
    if (wr) this._focusPlanet(p, wr.el);
    this.tourIndex++;
    this._tourTimer = setTimeout(() => this._nextTourStep(), 4500);
  }

  _stopTour() {
    this.tourActive = false;
    clearTimeout(this._tourTimer);
    document.getElementById('btn-tour').classList.remove('active');
  }

  /* ─── ZOOM READOUT ────────────────────────────── */

  _onZoomChange(s) {
    this.zoomReadout.textContent = Math.round(s * 100) + '%';
  }

  _updateZoomReadout() {
    const s = this.vp.getScale();
    this.zoomReadout.textContent = Math.round(s * 100) + '%';
  }

  /* ─── UI BINDINGS ─────────────────────────────── */

  _bindUI() {
    /* Panel close */
    this.panelClose.addEventListener('click', () => { this._hidePanel(); this.vp.reset(); });

    /* Toolbar */
    document.getElementById('btn-zoom-in').addEventListener('click',  () => {
      this.vp.zoomBy(1.22);
    });
    document.getElementById('btn-zoom-out').addEventListener('click', () => {
      this.vp.zoomBy(1 / 1.22);
    });
    document.getElementById('btn-reset').addEventListener('click', () => {
      this._hidePanel(); this.vp.reset(); this._stopTour();
    });
    document.getElementById('btn-tour').addEventListener('click', () => {
      this.tourActive ? this._stopTour() : this._startTour();
    });
    document.getElementById('btn-speed').addEventListener('click', (e) => {
      this.orbitFast = !this.orbitFast;
      this.orbitSpeed = this.orbitFast ? 0.00032 : 0.00008;
      e.currentTarget.classList.toggle('active', this.orbitFast);
    });

    /* Click on viewport background = close panel */
    this.viewport.addEventListener('click', (e) => {
      if (e.target === this.viewport || e.target === this.world) {
        this._hidePanel();
      }
    });

    /* Keyboard */
    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') { this._hidePanel(); this.vp.reset(); this._stopTour(); }
      if (e.key === 'r' || e.key === 'R') { this._hidePanel(); this.vp.reset(); }
      if (e.key === 't' || e.key === 'T') { this.tourActive ? this._stopTour() : this._startTour(); }
    }, { passive: true });
  }
}

  const intro = document.getElementById('intro');

    intro.classList.add('hidden');
    setTimeout(() => { intro.remove(); }, 900);
    app.init();
  }
}, { once: true, passive: true });
