<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Cosmic Portfolio - a realistic infinite-zoom portfolio set inside a calm cinematic space field.">
  <title>Cosmic Portfolio - Immersive Space</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <div id="sun-glow" aria-hidden="true"></div>
  <canvas id="starfield"></canvas>

  <div id="viewport">
    <div id="world"></div>
  </div>

  <header id="hud" aria-live="polite">
    <div class="hud-block">
      <span class="hud-label">Current World</span>
      <strong id="focus-readout">AETHER - Identity Signal</strong>
    </div>
    <div class="hud-block hud-right">
      <span class="hud-label">Depth</span>
      <strong id="zoom-readout">230%</strong>
    </div>
  </header>

  <div id="world-hint">Scroll to move through depth. Drag to drift between worlds.</div>
  <div id="minimap" aria-label="Spatial orientation"></div>
  <div id="warp-overlay"></div>

  <script type="module" src="./app/main.js"></script>
</body>
</html>
